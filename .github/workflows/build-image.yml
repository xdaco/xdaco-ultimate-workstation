name: Build Image (reusable, multi-arch native)

# Builds a single image on native runners (one job per architecture, no QEMU),
# pushes each arch by digest, then merges them into one manifest list tagged
# :latest + :<date_tag>. Returns the manifest-list digest for signing.
on:
  workflow_call:
    inputs:
      image:
        description: "Image name (without registry/namespace), e.g. xdaco-ultimate-base"
        required: true
        type: string
      context:
        description: "Build context directory, e.g. ./containers/xdaco-ultimate-base"
        required: true
        type: string
      publish:
        description: "Push multi-arch manifest to the registry?"
        required: true
        type: boolean
      verify_on_pr:
        description: "Build (without pushing) on PR/push for verification? Set false for heavy images."
        required: false
        default: true
        type: boolean
      date_tag:
        description: "Immutable date tag (YYYY-MM-DD) shared across images in this run"
        required: true
        type: string
    outputs:
      digest:
        description: "Digest of the merged manifest list (empty when not publishing)"
        value: ${{ jobs.merge.outputs.digest }}

env:
  REGISTRY: docker.io
  NAMESPACE: 1xdaco

jobs:
  # ---------------------------------------------------------------------------
  # One native build per architecture. Verification (PR/push) only builds;
  # publish (workflow_dispatch) pushes each arch by digest.
  # ---------------------------------------------------------------------------
  build:
    # Skip entirely when this is a verification run for a heavy image (verify_on_pr=false).
    if: ${{ inputs.publish || inputs.verify_on_pr }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare platform pair
        id: prep
        run: |
          platform="${{ matrix.platform }}"
          echo "pair=${platform//\//-}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ inputs.publish }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Verification: build the single native arch, do not push.
      - name: Build (verify only)
        if: ${{ !inputs.publish }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=${{ inputs.image }}-${{ steps.prep.outputs.pair }}
          cache-to: type=gha,scope=${{ inputs.image }}-${{ steps.prep.outputs.pair }},mode=max

      # Publish: push this arch by digest (no tag) for later manifest merge.
      - name: Build & push by digest
        if: ${{ inputs.publish }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ inputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ inputs.image }}-${{ steps.prep.outputs.pair }}
          cache-to: type=gha,scope=${{ inputs.image }}-${{ steps.prep.outputs.pair }},mode=max

      - name: Export digest
        if: ${{ inputs.publish }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: ${{ inputs.publish }}
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ inputs.image }}-${{ steps.prep.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Assemble the per-arch digests into a single multi-arch manifest list.
  # Pushing the index atomically means :latest is never single-arch.
  # ---------------------------------------------------------------------------
  merge:
    if: ${{ inputs.publish }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      digest: ${{ steps.inspect.outputs.digest }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ inputs.image }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Create manifest list (latest + immutable date)
        working-directory: /tmp/digests
        run: |
          REF="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ inputs.image }}"
          refs=()
          for d in *; do refs+=("${REF}@sha256:${d}"); done
          docker buildx imagetools create \
            -t "${REF}:latest" \
            -t "${REF}:${{ inputs.date_tag }}" \
            "${refs[@]}"

      - name: Inspect & capture manifest digest
        id: inspect
        run: |
          REF="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ inputs.image }}"
          docker buildx imagetools inspect "${REF}:${{ inputs.date_tag }}"
          digest="$(docker buildx imagetools inspect "${REF}:${{ inputs.date_tag }}" --format '{{.Manifest.Digest}}')"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        run: |
          REF="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ inputs.image }}"
          syft "${REF}:${{ inputs.date_tag }}" -o spdx-json > "sbom-${{ inputs.image }}.json"

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ inputs.image }}
          path: sbom-${{ inputs.image }}.json
