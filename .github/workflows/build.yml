name: Build & Sign Containers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      sign_image:
        description: "Sign the images with Cosign?"
        required: false
        default: false
        type: boolean
      push_to_registry:
        description: "Push multi-arch images to Docker Hub?"
        required: false
        default: false
        type: boolean

jobs:
  # Resolve run mode once and share it with every image build.
  #   publish = push and/or sign (both require a registry push)
  #   date    = immutable YYYY-MM-DD tag, identical across images in this run
  setup:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.m.outputs.publish }}
      date: ${{ steps.m.outputs.date }}
    steps:
      - id: m
        run: |
          if [ "${{ inputs.push_to_registry }}" = "true" ] || [ "${{ inputs.sign_image }}" = "true" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi
          echo "date=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

  # base first — cpp/php resolve base:latest from the registry when publishing.
  base:
    needs: setup
    uses: ./.github/workflows/build-image.yml
    with:
      image: xdaco-ultimate-base
      context: ./containers/xdaco-ultimate-base
      publish: ${{ needs.setup.outputs.publish == 'true' }}
      date_tag: ${{ needs.setup.outputs.date }}
    secrets: inherit

  # cpp/php are siblings — both build FROM base:latest.
  cpp:
    needs: [setup, base]
    uses: ./.github/workflows/build-image.yml
    with:
      image: xdaco-ultimate-cpp
      context: ./containers/xdaco-ultimate-cpp
      publish: ${{ needs.setup.outputs.publish == 'true' }}
      date_tag: ${{ needs.setup.outputs.date }}
    secrets: inherit

  php:
    needs: [setup, base]
    uses: ./.github/workflows/build-image.yml
    with:
      image: xdaco-ultimate-php
      context: ./containers/xdaco-ultimate-php
      publish: ${{ needs.setup.outputs.publish == 'true' }}
      date_tag: ${{ needs.setup.outputs.date }}
    secrets: inherit

  # Sign the manifest-list digests (covers every architecture in each index).
  sign:
    needs: [base, cpp, php]
    if: ${{ inputs.sign_image == true }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for Cosign keyless (OIDC) signing
      contents: read
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Cosign Signing (Keyless)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          REG="docker.io/1xdaco"
          echo "Signing xdaco-ultimate-base..."
          cosign sign --yes "${REG}/xdaco-ultimate-base@${{ needs.base.outputs.digest }}"
          echo "Signing xdaco-ultimate-cpp..."
          cosign sign --yes "${REG}/xdaco-ultimate-cpp@${{ needs.cpp.outputs.digest }}"
          echo "Signing xdaco-ultimate-php..."
          cosign sign --yes "${REG}/xdaco-ultimate-php@${{ needs.php.outputs.digest }}"
